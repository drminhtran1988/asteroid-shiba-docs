<svg viewBox="0 0 900 470" width="1600" height="836" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="st sd" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
<title id="st">Chance to find something valuable by Scanner level</title>
<desc id="sd">Your chance of a valuable find rises from about 1% at Free to 50% at Scanner Level 10.</desc>
<defs>
<linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
<stop offset="0" stop-color="#7ECFEF" stop-opacity="0.55"/>
<stop offset="1" stop-color="#7ECFEF" stop-opacity="0.03"/>
</linearGradient>
<filter id="gl" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="4"/></filter>
</defs>
<rect x="0" y="0" width="900" height="470" rx="16" fill="#04060d"/>
<text x="70" y="44" fill="#EAF9FF" font-size="24" font-weight="800">Your chance to find something valuable</text>
<text x="70" y="70" fill="#8FA6BB" font-size="15" font-weight="500">Grows with every Scanner level — from ~1% up to 50%.</text>
<!-- gridlines + y labels -->
<g stroke="#17202f" stroke-width="1">
<line x1="70" y1="90" x2="860" y2="90"/><line x1="70" y1="150" x2="860" y2="150"/><line x1="70" y1="210" x2="860" y2="210"/><line x1="70" y1="270" x2="860" y2="270"/><line x1="70" y1="330" x2="860" y2="330"/><line x1="70" y1="390" x2="860" y2="390"/>
</g>
<g fill="#6b7f96" font-size="12" text-anchor="end">
<text x="60" y="94">50%</text><text x="60" y="154">40%</text><text x="60" y="214">30%</text><text x="60" y="274">20%</text><text x="60" y="334">10%</text><text x="60" y="394">0%</text>
</g>
<!-- area + line -->
<path d="M70,384 L149,371.5 L228,365.5 L307,358 L386,350 L465,337.8 L544,324.5 L623,299.5 L702,266 L781,197.4 L860,90 L860,390 L70,390 Z" fill="url(#area)"/>
<path d="M70,384 L149,371.5 L228,365.5 L307,358 L386,350 L465,337.8 L544,324.5 L623,299.5 L702,266 L781,197.4 L860,90" fill="none" stroke="#7ECFEF" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#gl)"/>
<!-- key markers -->
<g fill="#EAF9FF">
<circle cx="70" cy="384" r="5" fill="#7ECFEF"/><text x="78" y="378" font-size="13" font-weight="700">~1%</text>
<circle cx="544" cy="324.5" r="5" fill="#7ECFEF"/><text x="552" y="318" font-size="13" font-weight="700">~11%</text>
<circle cx="860" cy="90" r="6" fill="#7ECFEF"/><text x="852" y="82" font-size="15" font-weight="800" text-anchor="end">50%</text>
</g>
<!-- x labels -->
<g fill="#6b7f96" font-size="12" text-anchor="middle">
<text x="70" y="412">Free</text><text x="149" y="412">Lv1</text><text x="228" y="412">Lv2</text><text x="307" y="412">Lv3</text><text x="386" y="412">Lv4</text><text x="465" y="412">Lv5</text><text x="544" y="412">Lv6</text><text x="623" y="412">Lv7</text><text x="702" y="412">Lv8</text><text x="781" y="412">Lv9</text><text x="860" y="412">Lv10</text>
</g>
<text x="465" y="448" text-anchor="middle" fill="#8FA6BB" font-size="12.5" font-weight="600">SCANNER LEVEL — every upgrade tilts the curve toward rarer, richer finds</text>
</svg>
